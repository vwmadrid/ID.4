<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ID.4 Exacta</title>
    <style>
        body { font-family: sans-serif; background: #001e50; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; }
        h2 { color: #001e50; text-align: center; border-bottom: 2px solid #00b0f0; padding-bottom: 10px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8em; font-weight: bold; margin-bottom: 5px; color: #666; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 1.1em; }
        button { width: 100%; padding: 15px; background: #001e50; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .result { background: #f0faff; padding: 15px; border-radius: 10px; margin-top: 20px; display: none; border-left: 5px solid #00b0f0; }
        .result p { margin: 10px 0; font-size: 1.1em; color: #001e50; display: flex; justify-content: space-between; }
        .val { font-weight: bold; color: #00b0f0; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚡ Mi ID.4 Pro</h2>
    
    <div class="group">
        <label>Batería Actual (%)</label>
        <input type="number" id="actual" value="59">
    </div>

    <div class="group">
        <label>Cargar hasta (%)</label>
        <input type="number" id="target" value="100">
    </div>

    <div class="group">
        <label>Potencia Real (kW)</label>
        <input type="number" id="potencia" value="20">
    </div>

    <div class="group">
        <label>Precio kWh (€)</label>
        <input type="number" id="precio" value="0.10" step="0.01">
    </div>

    <button onclick="calcular()">CALCULAR CARGA</button>

    <div id="res" class="result">
        <p>Tiempo de carga: <span id="t_txt" class="val"></span></p>
        <p>Hora de fin: <span id="h_txt" class="val"></span></p>
        <p>Energía: <span id="k_txt" class="val"></span> kWh</p>
        <p>Coste: <span id="c_txt" class="val"></span> €</p>
    </div>
</div>

<script>
function calcular() {
    const batTotal = 77;
    const pActual = parseFloat(document.getElementById('actual').value);
    const pTarget = parseFloat(document.getElementById('target').value);
    const kwRed = parseFloat(document.getElementById('potencia').value);
    const eurKwh = parseFloat(document.getElementById('precio').value);

    // 1. Energía que falta por meter
    const kwhNecesarios = ((pTarget - pActual) / 100) * batTotal;

    // 2. Cálculo de tiempo (lineal + 5 minutos de balanceo final si llega al 100%)
    let horasDeCarga = kwhNecesarios / kwRed;
    if (pTarget > 98) {
        horasDeCarga += 0.08; // Añadimos unos 5 min de margen por el tramo final
    }

    // 3. Resultados
    const horas = Math.floor(horasDeCarga);
    const mins = Math.round((horasDeCarga - horas) * 60);
    const coste = kwhNecesarios * eurKwh;

    // 4. Calcular hora de fin según el reloj del móvil
    let ahora = new Date();
    ahora.setMinutes(ahora.getMinutes() + (horasDeCarga * 60));
    let horaFinal = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');

    // Mostrar
    document.getElementById('res').style.display = 'block';
    document.getElementById('t_txt').innerText = horas + "h " + mins + "min";
    document.getElementById('h_txt').innerText = horaFinal;
    document.getElementById('k_txt').innerText = kwhNecesarios.toFixed(1);
    document.getElementById('c_txt').innerText = coste.toFixed(2);
}
</script>

</body>
</html>
