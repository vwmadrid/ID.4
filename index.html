<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Carga ID.4</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #001e50; padding: 15px; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 450px; }
        h2 { color: #001e50; text-align: center; margin-bottom: 25px; border-bottom: 2px solid #00b0f0; padding-bottom: 10px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85em; font-weight: bold; color: #555; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1.1em; transition: 0.3s; }
        input:focus { border-color: #00b0f0; outline: none; }
        button { width:100%; padding:15px; background:#001e50; color:white; border:none; border-radius:10px; cursor:pointer; font-size:1.1em; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        button:active { transform: scale(0.98); background: #00b0f0; }
        .result { background: #f0f8ff; padding: 20px; border-radius: 12px; margin-top: 25px; border: 1px solid #d0e4f5; display: none; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .result p { margin: 8px 0; color: #001e50; display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .highlight { font-weight: bold; color: #00b0f0; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚡ Mi ID.4 Pro/GTX</h2>
    
    <div class="group">
        <label>Batería Actual (%)</label>
        <input type="number" id="actualPct" value="20">
    </div>

    <div class="group">
        <label>¿Hasta qué % quieres cargar?</label>
        <input type="number" id="targetPct" value="80">
    </div>

    <div class="group">
        <label>Precio por kWh (€)</label>
        <input type="number" id="priceKwh" value="0.10" step="0.001">
    </div>

    <div class="group">
        <label>Potencia del poste (kW)</label>
        <input type="number" id="powerKw" value="7.4">
    </div>

    <button onclick="calcular()">CALCULAR CARGA</button>

    <div id="res" class="result">
        <p>Añadirás: <span id="kwhRecuperar" class="highlight"></span> kWh</p>
        <p>Distancia ganada: <span id="kmExtra" class="highlight"></span> km</p>
        <p>Coste total: <span id="costeTotal" class="highlight"></span> €</p>
        <p>Tiempo: <span id="tiempoTotal" class="highlight"></span></p>
    </div>
</div>

<script>
function calcular() {
    const total = 77; // Tu batería es de 77 siempre
    const actual = parseFloat(document.getElementById('actualPct').value);
    const target = parseFloat(document.getElementById('targetPct').value);
    const precio = parseFloat(document.getElementById('priceKwh').value);
    const potencia = parseFloat(document.getElementById('powerKw').value);

    const kwhAMeter = (total * (target - actual)) / 100;
    const coste = kwhAMeter * precio * 1.05; // 5% de pérdida
    const horas = kwhAMeter / potencia;
    const h = Math.floor(horas);
    const m = Math.round((horas - h) * 60);
    const km = (kwhAMeter / 18) * 100;

    document.getElementById('res').style.display = 'block';
    document.getElementById('kwhRecuperar').innerText = kwhAMeter.toFixed(1);
    document.getElementById('costeTotal').innerText = coste.toFixed(2);
    document.getElementById('tiempoTotal').innerText = h + "h " + m + "min";
    document.getElementById('kmExtra').innerText = Math.round(km);
}
</script>

</body>
</html>
