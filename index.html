<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ID.4 Realista</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #001e50; padding: 15px; display: flex; justify-content: center; min-height: 100vh; margin: 0; color: #333; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 450px; align-self: center; }
        h2 { color: #001e50; text-align: center; margin-bottom: 20px; border-bottom: 3px solid #00b0f0; padding-bottom: 10px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85em; font-weight: bold; color: #666; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1.1em; }
        button { width:100%; padding:15px; background:#001e50; color:white; border:none; border-radius:10px; cursor:pointer; font-size:1.1em; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        button:active { background: #00b0f0; }
        .result { background: #f0f8ff; padding: 20px; border-radius: 12px; margin-top: 25px; border: 1px solid #d0e4f5; display: none; }
        .result p { margin: 8px 0; display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; padding-bottom: 5px; }
        .highlight { font-weight: bold; color: #00b0f0; }
        .warning { font-size: 0.8em; color: #e67e22; font-style: italic; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚡ ID.4 Real-Time</h2>
    
    <div class="group">
        <label>Batería Actual (%)</label>
        <input type="number" id="actualPct" value="20">
    </div>

    <div class="group">
        <label>Objetivo de Carga (%)</label>
        <input type="number" id="targetPct" value="80">
    </div>

    <div class="group">
        <label>Precio kWh (€)</label>
        <input type="number" id="priceKwh" value="0.10" step="0.001">
    </div>

    <div class="group">
        <label>Potencia del cargador (kW)</label>
        <input type="number" id="powerKw" value="7.4">
    </div>

    <button onclick="calcular()">CALCULAR TIEMPO REAL</button>

    <div id="res" class="result">
        <p>Coste estimado: <span id="costeTotal" class="highlight"></span> €</p>
        <p>Tiempo estimado: <span id="tiempoTotal" class="highlight"></span></p>
        <p>Energía: <span id="kwhRecuperar" class="highlight"></span> kWh</p>
        <p>Autonomía Ganada: <span id="kmExtra" class="highlight"></span> km</p>
        <div id="avisoCurva" class="warning"></div>
    </div>
</div>

<script>
function calcular() {
    const totalBat = 77; 
    let actual = parseFloat(document.getElementById('actualPct').value);
    let target = parseFloat(document.getElementById('targetPct').value);
    const precio = parseFloat(document.getElementById('priceKwh').value);
    const potencia = parseFloat(document.getElementById('powerKw').value);

    let tiempoHoras = 0;
    let kwhTotal = 0;

    // Simulación de curva de carga tramo a tramo
    for (let i = actual; i < target; i++) {
        let eficiencia = 1.0;
        let kwhTramo = (1 / 100) * totalBat;
        
        // Simular caída de potencia después del 80%
        if (i >= 80) {
            eficiencia = 0.3; // El coche carga mucho más lento
        } else if (i >= 95) {
            eficiencia = 0.1; // El último 5% es eterno
        }

        tiempoHoras += kwhTramo / (potencia * eficiencia);
        kwhTotal += kwhTramo;
    }

    const coste = kwhTotal * precio * 1.05; // 5% pérdidas red
    const km = (kwhTotal / 18) * 100;

    // Formatear tiempo
    const h = Math.floor(tiempoHoras);
    const m = Math.round((tiempoHoras - h) * 60);

    document.getElementById('res').style.display = 'block';
    document.getElementById('costeTotal').innerText = coste.toFixed(2);
    document.getElementById('tiempoTotal').innerText = h + "h " + m + "min";
    document.getElementById('kwhRecuperar').innerText = kwhTotal.toFixed(1);
    document.getElementById('kmExtra').innerText = Math.round(km);

    if (target > 80) {
        document.getElementById('avisoCurva').innerText = "⚠️ Nota: Cargar más del 80% es más lento para proteger la batería.";
    } else {
        document.getElementById('avisoCurva').innerText = "";
    }
}
</script>

</body>
</html>
