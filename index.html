<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ID.4 Precisa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #001e50; padding: 15px; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 450px; align-self: center; }
        h2 { color: #001e50; text-align: center; border-bottom: 3px solid #00b0f0; padding-bottom: 10px; }
        .group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85em; font-weight: bold; color: #666; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1.1em; }
        button { width:100%; padding:15px; background:#001e50; color:white; border:none; border-radius:10px; cursor:pointer; font-size:1.1em; font-weight: bold; margin-top: 10px; }
        .result { background: #f0f8ff; padding: 20px; border-radius: 12px; margin-top: 25px; display: none; }
        .result p { margin: 8px 0; display: flex; justify-content: space-between; border-bottom: 1px dashed #ccc; }
        .highlight { font-weight: bold; color: #00b0f0; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚡ Mi ID.4 Pro</h2>
    
    <div class="group">
        <label>Batería Actual (%)</label>
        <input type="number" id="actualPct" value="59">
    </div>

    <div class="group">
        <label>Objetivo de Carga (%)</label>
        <input type="number" id="targetPct" value="100">
    </div>

    <div class="group">
        <label>Precio kWh (€)</label>
        <input type="number" id="priceKwh" value="0.10" step="0.001">
    </div>

    <div class="group">
        <label>Potencia en pantalla (kW)</label>
        <input type="number" id="powerKw" value="20">
    </div>

    <button onclick="calcular()">CALCULAR TIEMPO</button>

    <div id="res" class="result">
        <p>Finalización estimada: <span id="horaFin" class="highlight"></span></p>
        <p>Tiempo de carga: <span id="tiempoTotal" class="highlight"></span></p>
        <p>Coste: <span id="costeTotal" class="highlight"></span> €</p>
        <p>Energía a añadir: <span id="kwhRecuperar" class="highlight"></span> kWh</p>
    </div>
</div>

<script>
function calcular() {
    const totalBat = 77; 
    let actual = parseFloat(document.getElementById('actualPct').value);
    let target = parseFloat(document.getElementById('targetPct').value);
    const precio = parseFloat(document.getElementById('priceKwh').value);
    const potenciaNominal = parseFloat(document.getElementById('powerKw').value);

    let tiempoHoras = 0;
    let kwhTotal = 0;

    for (let i = actual; i < target; i++) {
        let kwhTramo = (1 / 100) * totalBat;
        let potenciaActual = potenciaNominal;
        
        // Curva inteligente: solo frena mucho si la potencia es alta (>50kW)
        // A 20kW (como tu foto), el coche apenas frena hasta el 95%
        if (i >= 90) {
            potenciaActual = potenciaNominal * 0.6; // Pequeño ajuste al final
        }
        if (i >= 98) {
            potenciaActual = potenciaNominal * 0.3; // Los últimos 2 puntos siempre cuestan
        }

        tiempoHoras += kwhTramo / potenciaActual;
        kwhTotal += kwhTramo;
    }

    const coste = kwhTotal * precio;
    const h = Math.floor(tiempoHoras);
    const m = Math.round((tiempoHoras - h) * 60);

    // Cálculo de hora de finalización
    let ahora = new Date();
    ahora.setMinutes(ahora.getMinutes() + (tiempoHoras * 60));
    let horaFinal = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');

    document.getElementById('res').style.display = 'block';
    document.getElementById('costeTotal').innerText = coste.toFixed(2);
    document.getElementById('tiempoTotal').innerText = h + "h " + m + "min";
    document.getElementById('kwhRecuperar').innerText = kwhTotal.toFixed(1);
    document.getElementById('horaFin').innerText = horaFinal;
}
</script>

</body>
</html>
